openapi: 3.1.0
info:
  title: DTM Backend API
  version: 1.0.0
  summary: DeFi Transparency Microscope — backend REST + WebSocket contract
  description: |
    Public contract for the DTM backend (`dtm-backend`).  All REST
    routes are mounted under `/api/v1`.  The realtime feed is
    available on the WebSocket endpoint at `/ws` (not described by
    OpenAPI; see the "Realtime (WebSocket)" appendix below).

    ## Conventions

    - **BigInt serialisation.**  All integer-typed fields
      (token amounts, reserves, gas, P&L, etc.) are emitted and
      accepted as **decimal strings** (e.g. `"1000000000000000000"`).
      JavaScript clients should `BigInt(value)` on the way in.
    - **Error envelope.**  All non-2xx responses use the same JSON
      shape (see `ErrorResponse`).
    - **CORS.**  Origins are configurable via the `CORS_ORIGINS` env
      var; in dev the default is `*`.
    - **Chain.**  v1 hard-codes Ethereum mainnet addresses; see
      `backend/src/chain/addresses.ts` for the canonical list.

servers:
  - url: http://localhost:8000
    description: Local dev server
  - url: https://dtm.example.com
    description: Production (placeholder)

tags:
  - name: health
    description: Liveness / readiness
  - name: chain
    description: Read-only views of on-chain state
  - name: experiments
    description: Read preset configs and run deterministic simulations
  - name: realtime
    description: WebSocket push feed (see spec body for the protocol)

paths:
  /api/v1/health:
    get:
      tags: [health]
      summary: Liveness + chain head + WS hub status
      description: |
        Returns the current chain head block number and the WebSocket
        hub connection state.  Provider failures are absorbed and
        surfaced as `blockNumber: 0` so the client can still render a
        degraded state.
      operationId: getHealth
      responses:
        '200':
          description: Health snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                ok:
                  value:
                    status: ok
                    chain: mainnet
                    blockNumber: 19876543
                    wsConnected: true

  /api/v1/pools:
    get:
      tags: [chain]
      summary: Curated 3-pool summary (V2 + V3)
      description: |
        Returns the three curated pools (V2 WETH/USDC, V3 WETH/USDC
        0.3%, V3 WETH/USDT 0.3%) with their current on-chain state.
        V2 pools carry `reserve0/1`; V3 pools carry `sqrtPriceX96`,
        `liquidity`, `tick`, and `feeTier`.
      operationId: listPools
      responses:
        '200':
          description: Array of pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pool'
        '502':
          $ref: '#/components/responses/UpstreamUnreachable'

  /api/v1/transactions:
    get:
      tags: [chain]
      summary: Recent on-chain transactions, classified
      description: |
        Returns the most recent transactions across the curated
        address set, classified by MEV type.  Bigint fields
        (`value`, `gasPrice`, `gasLimit`, `mevProfit`, `victimLoss`)
        are emitted as decimal strings.
      operationId: listTransactions
      parameters:
        - in: query
          name: blocks
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 10
          description: Trailing block range to scan
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
          description: Hard cap on results
        - in: query
          name: addresses
          schema:
            type: string
          description: Optional comma-separated list of addresses to filter on
      responses:
        '200':
          description: Array of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/ValidationError'
        '502':
          $ref: '#/components/responses/UpstreamUnreachable'

  /api/v1/lending-positions:
    get:
      tags: [chain]
      summary: Curated Aave V3 lending positions
      description: |
        Returns the curated Aave V3 positions used by the live UI.
        `collateral` and `debt` are maps from token address to
        decimal-string amount.
      operationId: listLendingPositions
      responses:
        '200':
          description: Array of lending positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LendingPosition'
        '502':
          $ref: '#/components/responses/UpstreamUnreachable'

  /api/v1/lp-positions:
    get:
      tags: [chain]
      summary: Curated Uniswap V3 LP positions
      description: |
        Returns the curated Uniswap V3 LP positions used by the
        live UI.  `id` is the NFT tokenId as a decimal string; bigint
        amounts (`amount0/1`, `feeIncomeE18`, `impermanentLossE18`,
        `netPnlE18`) are decimal strings.
      operationId: listLpPositions
      responses:
        '200':
          description: Array of LP positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LPPosition'
        '502':
          $ref: '#/components/responses/UpstreamUnreachable'

  /api/v1/experiments:
    get:
      tags: [experiments]
      summary: List experiment presets
      description: |
        Returns the static list of experiment presets.  The `id`
        field is the same string accepted by
        `GET /api/v1/experiments/{id}` and the `config` block is the
        verbatim config that the UI ships to the corresponding
        `POST /api/v1/experiments/*` endpoint.
      operationId: listExperimentPresets
      responses:
        '200':
          description: Array of presets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExperimentPreset'

  /api/v1/experiments/{id}:
    get:
      tags: [experiments]
      summary: Get a single preset by id
      operationId: getExperimentPreset
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      responses:
        '200':
          description: The preset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentPreset'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/experiments/sandwich:
    post:
      tags: [experiments]
      summary: Run a sandwich-attack simulation
      description: |
        Same-direction 3-swap model:

        1. Attacker frontrun  — sell `token0` for `token1`
        2. Victim trade       — sell `token0` for `token1`
        3. Attacker backrun   — sell the received `token1` back for `token0`

        If `scenario.poolAddress` matches the curated V2 WETH/USDC
        pair, the backend reads fresh reserves via `provider.call()`.
        Otherwise it uses the supplied `reserve0/1`.  Bigint amounts
        are decimal strings on the wire.
      operationId: runSandwichExperiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SandwichRequest'
      responses:
        '200':
          description: Sandwich simulation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentResultSandwich'
        '400':
          $ref: '#/components/responses/ValidationError'
        '502':
          $ref: '#/components/responses/UpstreamUnreachable'

  /api/v1/experiments/il:
    post:
      tags: [experiments]
      summary: Run an impermanent-loss simulation
      description: |
        `priceRatio = newPrice / oldPrice`.  When `tickLower` and
        `tickUpper` are both supplied, the run is treated as a
        concentrated V3 position; otherwise the V2 full-range
        formula is used.  The `il` field is in `[-1, 0]`.
      operationId: runIlExperiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ILRequest'
      responses:
        '200':
          description: IL simulation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentResultIL'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/experiments/attribution:
    post:
      tags: [experiments]
      summary: Decompose a trade's P&L into named components
      description: |
        Decomposition:  `total = priceImpact + fees - gasCost + rebates`.
        All four component values are decimal strings; `percentages`
        is the absolute-value share of each component (sums to 1
        when `total ≠ 0`, all zero when `total == 0`).
      operationId: runAttributionExperiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttributionRequest'
      responses:
        '200':
          description: Attribution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentResultAttribution'
        '400':
          $ref: '#/components/responses/ValidationError'

components:
  parameters:
    ExperimentId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Preset id (e.g. `sandwich-eth-usdc`)

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: not_found
            message: experiment not found
    ValidationError:
      description: Invalid query / body — Zod issues attached
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          example:
            error: validation
            message: invalid query parameters
            issues:
              - code: too_small
                path: [blocks]
                message: blocks must be >= 1
    UpstreamUnreachable:
      description: Upstream RPC call failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: upstream_unreachable
            message: "eth_call failed: connection refused"

  schemas:
    # ─── domain types ────────────────────────────────────────────
    Token:
      type: object
      required: [address, symbol, name, decimals]
      properties:
        address:
          type: string
          description: EIP-55 checksummed token contract address
          example: '0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2'
        symbol:
          type: string
          example: WETH
        name:
          type: string
          example: Wrapped Ether
        decimals:
          type: integer
          minimum: 0
          maximum: 255
          example: 18

    Pool:
      type: object
      required: [id, protocol, token0, token1]
      properties:
        id:
          type: string
          description: Lower-case pool address (stable key)
          example: '0xb4e16d0168e52d35cacd2c6185b44281ec28c9dc'
        protocol:
          type: string
          enum: [uniswap_v2, uniswap_v3]
        token0:
          $ref: '#/components/schemas/Token'
        token1:
          $ref: '#/components/schemas/Token'
        reserve0:
          type: string
          description: V2 only — decimal string of `uint112`
        reserve1:
          type: string
          description: V2 only — decimal string of `uint112`
        sqrtPriceX96:
          type: string
          description: V3 only — decimal string of `uint160`
        feeTier:
          type: integer
          description: V3 only — fee in hundredths of a bip (3000 = 0.3 %)
        liquidity:
          type: string
          description: V3 only — decimal string of `uint128`
        tick:
          type: integer
          description: V3 only — `int24`

    Transaction:
      type: object
      required:
        - hash
        - from
        - to
        - value
        - gasPrice
        - gasLimit
        - input
        - nonce
        - timestamp
        - type
      properties:
        hash:
          type: string
          example: '0xabc…'
        from:
          type: string
        to:
          type: string
        value:
          type: string
          description: wei, decimal string
        gasPrice:
          type: string
          description: wei, decimal string
        gasLimit:
          type: string
          description: gas units, decimal string
        input:
          type: string
          description: hex calldata (with `0x` prefix)
        nonce:
          type: integer
        blockNumber:
          type: integer
        timestamp:
          type: integer
          description: Unix seconds
        type:
          type: string
          enum: [normal, sandwich, arbitrage, jit, liquidation]
        mevProfit:
          type: string
          description: Decimal string; only present on MEV txs.
        victimLoss:
          type: string
          description: Decimal string; only present on sandwich txs.

    LendingPosition:
      type: object
      required:
        - id
        - owner
        - protocol
        - collateral
        - debt
        - liquidationThresholdE18
        - healthFactor
        - timestamp
      properties:
        id:
          type: string
        owner:
          type: string
        protocol:
          type: string
          enum: [aave_v3]
        collateral:
          type: object
          additionalProperties:
            type: string
          description: token address → decimal string amount
        debt:
          type: object
          additionalProperties:
            type: string
          description: token address → decimal string amount
        liquidationThresholdE18:
          type: string
          description: Decimal string scaled to 1e18
        healthFactor:
          type: number
          description: Plain number (already 1e18-scaled; HF is a ratio)
        timestamp:
          type: integer

    LPPosition:
      type: object
      required:
        - id
        - owner
        - poolId
        - token0
        - token1
        - amount0
        - amount1
        - tickLower
        - tickUpper
        - feeTier
        - apr
        - valueUsd
        - feeIncomeE18
        - impermanentLossE18
        - netPnlE18
        - timestamp
      properties:
        id:
          type: string
          description: NFT tokenId as decimal string
        owner:
          type: string
        poolId:
          type: string
        token0:
          $ref: '#/components/schemas/Token'
        token1:
          $ref: '#/components/schemas/Token'
        amount0:
          type: string
        amount1:
          type: string
        tickLower:
          type: integer
        tickUpper:
          type: integer
        feeTier:
          type: integer
          description: 500, 3000 or 10000
        apr:
          type: number
        valueUsd:
          type: number
        feeIncomeE18:
          type: string
        impermanentLossE18:
          type: string
        netPnlE18:
          type: string
        timestamp:
          type: integer

    # ─── experiment requests / results ───────────────────────────
    ExperimentPreset:
      type: object
      required: [id, name, description, config]
      properties:
        id:
          type: string
          example: sandwich-eth-usdc
        name:
          type: string
        description:
          type: string
        config:
          type: object
          required: [name, protocol, reserve0, reserve1, fee, runs]
          properties:
            name:
              type: string
            description:
              type: string
            protocol:
              type: string
              enum: [uniswap_v2, uniswap_v3]
            reserve0:
              type: string
            reserve1:
              type: string
            fee:
              type: integer
              description: Hundredths of a bip
            tickLower:
              type: integer
            tickUpper:
              type: integer
            runs:
              type: integer

    SandwichRequest:
      type: object
      required: [scenario]
      properties:
        scenario:
          type: object
          required: [victimAmountIn, attackerAmountIn, fee]
          properties:
            poolAddress:
              type: string
              description: |
                Optional checksummed V2 pool address.  When supplied
                and matching the curated V2 WETH/USDC pair, the
                backend reads fresh reserves via `eth_call`.
            reserve0:
              type: string
            reserve1:
              type: string
            victimAmountIn:
              type: string
            attackerAmountIn:
              type: string
            fee:
              type: integer
              minimum: 0
              maximum: 1000000
              description: Hundredths of a bip

    ExperimentResultSandwich:
      type: object
      required:
        - durationMs
        - result
      properties:
        durationMs:
          type: integer
        result:
          type: object
          required:
            - attackerSpent
            - attackerReceived
            - attackerProfit
            - victimLoss
            - step1AmountOut
            - step2AmountOut
            - step3AmountOut
            - netProfit
            - usedProvider
            - feeHundredthsBip
          properties:
            attackerSpent:
              type: string
            attackerReceived:
              type: string
            attackerProfit:
              type: string
            victimLoss:
              type: string
            step1AmountOut:
              type: string
            step2AmountOut:
              type: string
            step3AmountOut:
              type: string
            netProfit:
              type: string
            usedProvider:
              type: boolean
            poolAddress:
              type: string
            feeHundredthsBip:
              type: integer

    ILRequest:
      type: object
      required: [reserve0, reserve1, priceRatio]
      properties:
        reserve0:
          type: string
        reserve1:
          type: string
        priceRatio:
          type: number
          exclusiveMinimum: 0
          description: newPrice / oldPrice
        tickLower:
          type: number
          description: V3 lower bound price
        tickUpper:
          type: number
          description: V3 upper bound price
        concentration:
          type: number
          description: Amplification factor (1 = V2)

    ExperimentResultIL:
      type: object
      required: [durationMs, result]
      properties:
        durationMs:
          type: integer
        result:
          type: object
          required: [il, variant, reserve0, reserve1, priceRatio]
          properties:
            il:
              type: number
              format: float
              minimum: -1
              maximum: 0
            variant:
              type: string
              enum: [v2, v3]
            reserve0:
              type: string
            reserve1:
              type: string
            priceRatio:
              type: number

    AttributionRequest:
      type: object
      required: [reserve0, reserve1, amountIn, fee]
      properties:
        reserve0:
          type: string
        reserve1:
          type: string
        amountIn:
          type: string
        fee:
          type: integer
          minimum: 0
          maximum: 1000000
          description: Hundredths of a bip
        rebates:
          type: string
        gasCost:
          type: string

    ExperimentResultAttribution:
      type: object
      required: [durationMs, result]
      properties:
        durationMs:
          type: integer
        result:
          type: object
          required:
            - priceImpact
            - fees
            - gasCost
            - rebates
            - netPnl
            - percentages
            - reserve0
            - reserve1
            - amountIn
            - feeHundredthsBip
          properties:
            priceImpact:
              type: string
            fees:
              type: string
            gasCost:
              type: string
            rebates:
              type: string
            netPnl:
              type: string
            percentages:
              type: object
              required: [priceImpact, fees, gasCost, rebates]
              properties:
                priceImpact:
                  type: number
                fees:
                  type: number
                gasCost:
                  type: number
                rebates:
                  type: number
            reserve0:
              type: string
            reserve1:
              type: string
            amountIn:
              type: string
            feeHundredthsBip:
              type: integer

    # ─── supporting types ────────────────────────────────────────
    HealthResponse:
      type: object
      required: [status, chain, blockNumber, wsConnected]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        chain:
          type: string
          description: |
            Friendly chain name.  Known: `mainnet`, `goerli`,
            `sepolia`, `polygon`, `arbitrum`, `optimism`, `base`;
            otherwise `chain:<id>`.
        blockNumber:
          type: integer
          description: 0 when the provider is unreachable
        wsConnected:
          type: boolean

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          enum: [not_found, validation, upstream_unreachable, internal]
        message:
          type: string
        traceId:
          type: string

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [issues]
          properties:
            issues:
              type: array
              items:
                type: object
                description: Raw ZodIssue shape — see https://zod.dev
