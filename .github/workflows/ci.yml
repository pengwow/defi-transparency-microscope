name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same ref so a fast follow-up commit
# doesn't queue behind a slow prior run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Backend unit tests (Python · FastAPI · web3.py)
  # ──────────────────────────────────────────────────────────────────
  backend-unit:
    name: backend · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend (editable + dev)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check src tests
      - name: Type check (mypy)
        working-directory: backend
        run: mypy src
      - name: Unit tests
        working-directory: backend
        run: pytest tests/ --ignore=tests/integration -q
      - name: Integration tests
        working-directory: backend
        run: pytest tests/integration -q
      - name: Coverage (xml + term)
        working-directory: backend
        run: |
          coverage run -m pytest tests/ -q
          coverage report
          coverage xml -o coverage/coverage.xml
      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # Frontend unit tests (excludes the *.integration.test.ts files)
  # ──────────────────────────────────────────────────────────────────
  frontend-unit:
    name: frontend · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm typecheck
        working-directory: frontend
      - run: pnpm lint
        working-directory: frontend
      - run: pnpm test
        working-directory: frontend
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # End-to-end: install backend, boot the offline stub on :8765,
  # verify /api/v1/health wire shape and CORS.  No public RPC, no
  # frontend build — those land in later phases.
  # ──────────────────────────────────────────────────────────────────
  e2e:
    name: e2e · backend skeleton (offline stub)
    runs-on: ubuntu-latest
    needs: [backend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Run end-to-end smoke
        env:
          PORT: 8765
        run: ./scripts/e2e-smoke.sh
      - name: Dump server log on failure
        if: failure()
        run: KEEP_LOG=1 bash -c 'ls -la /tmp/e2e-smoke-*-server.log 2>/dev/null | tail -1 | awk "{print \$NF}" | xargs -I{} cat {} || true'

  # ──────────────────────────────────────────────────────────────────
  # Frontend production build (with VITE_USE_BACKEND=true to catch
  # import / tree-shaking issues that the unit suite can miss).
  # ──────────────────────────────────────────────────────────────────
  frontend-build:
    name: frontend · build (VITE_USE_BACKEND=true)
    runs-on: ubuntu-latest
    needs: [frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Build with backend env vars
        env:
          VITE_USE_BACKEND: 'true'
          VITE_BACKEND_URL: http://127.0.0.1:8765
        run: pnpm build
        working-directory: frontend
      - name: Upload build artefact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
